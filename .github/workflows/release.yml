name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      releaseTag:
        description: "Existing release tag to upload assets to, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-appimage
            os: ubuntu-22.04
            args: --bundles appimage
            rustTargets: ""
            uploadPlainBinary: false
          - name: linux-arm64-appimage
            os: ubuntu-24.04-arm
            args: --bundles appimage
            rustTargets: ""
            uploadPlainBinary: false
          - name: windows
            os: windows-latest
            args: --no-bundle
            rustTargets: ""
            uploadPlainBinary: true
          - name: windows-arm64
            os: windows-11-arm
            args: --target aarch64-pc-windows-msvc --no-bundle
            rustTargets: aarch64-pc-windows-msvc
            uploadPlainBinary: true
          - name: macos-universal
            os: macos-latest
            args: --target universal-apple-darwin --no-bundle
            rustTargets: x86_64-apple-darwin,aarch64-apple-darwin
            uploadPlainBinary: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.releaseTag }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2 \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        if: matrix.rustTargets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust targets
        if: matrix.rustTargets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTargets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundles to release
        if: github.event_name == 'release'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          releaseAssetNamePattern: TestModelAlive-${{ matrix.name }}[ext]
          uploadPlainBinary: ${{ matrix.uploadPlainBinary }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Build and upload Tauri bundles manually
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.releaseTag }}
          releaseAssetNamePattern: TestModelAlive-${{ matrix.name }}[ext]
          uploadPlainBinary: ${{ matrix.uploadPlainBinary }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}
